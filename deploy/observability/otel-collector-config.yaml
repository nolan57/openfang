receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Jaeger protocol support
  jaeger:
    protocols:
      thrift_http:
        endpoint: 0.0.0.0:14268
      grpc:
        endpoint: 0.0.0.0:14250
      thrift_compact:
        endpoint: 0.0.0.0:6831
      thrift_binary:
        endpoint: 0.0.0.0:6832

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

  # Memory limit for the collector
  memory_limiter:
    check_interval: 1s
    limit_mib: 512

  # Filter out sensitive attributes
  transform:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - delete_key(attributes, "api_key")
          - delete_key(attributes, "secret")
          - delete_key(attributes, "password")
          - delete_key(attributes, "token")
          - delete_key(attributes, "authorization")
          - delete_key(attributes, "credential")
          - delete_key(attributes, "private_key")

exporters:
  # Export to Jaeger via OTLP HTTP
  otlphttp:
    endpoint: http://jaeger:4318
    tls:
      insecure: true

  # Export to Prometheus for metrics
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otel
    const_labels:
      service: opencode-agent

  # Debug exporter (optional, logs to console)
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, transform]
      exporters: [otlphttp, debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679
